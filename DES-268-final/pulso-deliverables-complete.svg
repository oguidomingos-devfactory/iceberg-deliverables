<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" width="1400" height="1000">
  <defs>
    <style>
      .bg-dark { fill: #0D1B2A; }
      .bg-card { fill: #1A2A36; }
      .text-title { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 700; fill: #F0E9DC; }
      .text-header { font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; fill: #00BFA5; }
      .text-body { font-family: 'DM Sans', sans-serif; font-size: 13px; fill: #8096A7; }
      .text-check { fill: #00BFA5; font-weight: 600; }
    </style>
  </defs>

  <rect width="1400" height="1000" class="bg-dark"/>

  <!-- Header -->
  <text x="40" y="50" class="text-title">Pulso Brand Identity v2</text>
  <text x="40" y="75" class="text-header">✅ Final Deliverables Package</text>

  <!-- Section 1: Logo -->
  <rect x="40" y="100" width="620" height="400" rx="8" class="bg-card"/>
  <text x="60" y="130" class="text-header">1. Logo (6 Variações)</text>
  
  <text x="60" y="160" class="text-body">✓ P Serif + Heartbeat (#00BFA5)</text>
  <text x="60" y="185" class="text-body">✓ Wordmark: DM Sans 700</text>
  <text x="60" y="210" class="text-body">✓ Light, Dark, Teal, Névoa backgrounds</text>
  <text x="60" y="235" class="text-body">✓ Icon-only versions (Light + Dark)</text>
  <text x="60" y="260" class="text-body">✓ SVG + PNG @2x/@3x (high-res)</text>
  
  <text x="60" y="310" class="text-header">Assets:</text>
  <text x="60" y="340" class="text-body">• pulso-logo-final.svg (main)</text>
  <text x="60" y="365" class="text-body">• pulso-logo-variations.svg (6x)</text>
  <text x="60" y="390" class="text-body">• PNG exports (ready)</text>
  <text x="60" y="415" class="text-body">• Figma file (editing)</text>

  <!-- Section 2: Mockups -->
  <rect x="700" y="100" width="620" height="400" rx="8" class="bg-card"/>
  <text x="720" y="130" class="text-header">2. Mockups & Templates</text>
  
  <text x="720" y="160" class="text-body">✓ Business Card (88x52mm)</text>
  <text x="720" y="185" class="text-body">✓ Email Signature (DM Sans)</text>
  <text x="720" y="210" class="text-body">✓ Instagram Feed (3x posts)</text>
  <text x="720" y="235" class="text-body">✓ Instagram Stories (1x template)</text>
  <text x="720" y="260" class="text-body">✓ All using brand palette + typography</text>
  
  <text x="720" y="310" class="text-header">Brand Guidelines:</text>
  <text x="720" y="340" class="text-body">• Paleta: Noite, Pulso, Areia, Névoa</text>
  <text x="720" y="365" class="text-body">• Typography: DM Serif + DM Sans</text>
  <text x="720" y="390" class="text-body">• Logo usage rules (80px min)</text>
  <text x="720" y="415" class="text-body">• Tagline + alternativa</text>

  <!-- Section 3: Summary -->
  <rect x="40" y="540" width="1320" height="420" rx="8" class="bg-card"/>
  <text x="60" y="575" class="text-title">Implementation Summary</text>

  <g id="summary">
    <text x="60" y="620" class="text-header">Color Palette (OBRIGATÓRIA)</text>
    <circle cx="80" cy="640" r="12" fill="#0D1B2A" stroke="#8096A7" stroke-width="1"/>
    <text x="100" y="648" class="text-body">Noite #0D1B2A</text>
    
    <circle cx="280" cy="640" r="12" fill="#00BFA5"/>
    <text x="300" y="648" class="text-body">Pulso #00BFA5</text>
    
    <circle cx="480" cy="640" r="12" fill="#F0E9DC" stroke="#E0D5C7" stroke-width="1"/>
    <text x="500" y="648" class="text-body">Areia #F0E9DC</text>
    
    <circle cx="680" cy="640" r="12" fill="#8096A7"/>
    <text x="700" y="648" class="text-body">Névoa #8096A7</text>
    
    <circle cx="900" cy="640" r="12" fill="#FAFAF8" stroke="#E0D5C7" stroke-width="1"/>
    <text x="920" y="648" class="text-body">Branco #FAFAF8</text>

    <text x="60" y="705" class="text-header">Typography (OBRIGATÓRIA)</text>
    <text x="60" y="735" class="text-body">• Headlines: DM Serif Display (autoridade com alma)</text>
    <text x="60" y="760" class="text-body">• Corpo: DM Sans 300/400/500 (clareza sem frieza)</text>
    <text x="60" y="785" class="text-body">• Logo: DM Serif P (letter) + DM Sans (wordmark) — família consistente</text>

    <text x="60" y="850" class="text-header">Logo Details</text>
    <text x="60" y="880" class="text-body">✓ P serif (DM Serif Display inspired) com heartbeat EEG (#00BFA5) integrado no bowl</text>
    <text x="60" y="905" class="text-body">✓ Wordmark: "Pulso" em DM Sans 700 (C opção — família coerência)</text>
    <text x="60" y="930" class="text-body">✓ Tagline: "Marketing de precisão para medicina" | Alt: "O crescimento do seu consultório em ritmo constante"</text>
  </g>

  <!-- Footer -->
  <rect x="40" y="980" width="1320" height="20" rx="4" fill="#00BFA5"/>
  <text x="60" y="996" class="text-body" fill="#0D1B2A">Ready for delivery. All brand specs compliant. SVG + PNG @2x/@3x. Mockups + Guidelines included.</text>
</svg>
