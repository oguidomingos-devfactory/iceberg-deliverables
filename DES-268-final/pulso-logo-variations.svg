<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      .p-light { fill: none; stroke: #0D1B2A; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .p-dark { fill: none; stroke: #F0E9DC; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .heartbeat { fill: none; stroke: #00BFA5; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .box { stroke: none; }
      .label { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; }
    </style>
  </defs>

  <!-- VARIATION 1: Light Background -->
  <rect class="box" x="20" y="20" width="220" height="280" fill="#FAFAF8" rx="8"/>
  <g transform="translate(50, 50)">
    <path class="p-light" d="M 40 20 L 40 220 M 40 20 L 140 20 Q 170 20 170 70 Q 170 100 140 100 L 40 100"/>
    <polyline class="heartbeat" points="75,85 85,85 89,71 94,99 99,79 104,91 108,85 127,85"/>
  </g>
  <text class="label" x="130" y="330" fill="#0D1B2A" text-anchor="middle">Light BG</text>

  <!-- VARIATION 2: Dark Background -->
  <rect class="box" x="280" y="20" width="220" height="280" fill="#0D1B2A" rx="8"/>
  <g transform="translate(310, 50)">
    <path class="p-dark" d="M 40 20 L 40 220 M 40 20 L 140 20 Q 170 20 170 70 Q 170 100 140 100 L 40 100"/>
    <polyline class="heartbeat" points="75,85 85,85 89,71 94,99 99,79 104,91 108,85 127,85"/>
  </g>
  <text class="label" x="390" y="330" fill="#0D1B2A" text-anchor="middle">Dark BG</text>

  <!-- VARIATION 3: Teal Background -->
  <rect class="box" x="540" y="20" width="220" height="280" fill="#00BFA5" rx="8"/>
  <g transform="translate(570, 50)">
    <path class="p-light" d="M 40 20 L 40 220 M 40 20 L 140 20 Q 170 20 170 70 Q 170 100 140 100 L 40 100"/>
    <polyline class="heartbeat" points="75,85 85,85 89,71 94,99 99,79 104,91 108,85 127,85"/>
  </g>
  <text class="label" x="650" y="330" fill="#0D1B2A" text-anchor="middle">Teal BG</text>

  <!-- VARIATION 4: Névoa Background -->
  <rect class="box" x="800" y="20" width="220" height="280" fill="#8096A7" rx="8"/>
  <g transform="translate(830, 50)">
    <path class="p-dark" d="M 40 20 L 40 220 M 40 20 L 140 20 Q 170 20 170 70 Q 170 100 140 100 L 40 100"/>
    <polyline class="heartbeat" points="75,85 85,85 89,71 94,99 99,79 104,91 108,85 127,85"/>
  </g>
  <text class="label" x="910" y="330" fill="#FAFAF8" text-anchor="middle">Névoa BG</text>

  <!-- VARIATION 5: Icon Only Light (no wordmark) -->
  <rect class="box" x="1060" y="20" width="220" height="280" fill="#F0E9DC" rx="8"/>
  <g transform="translate(1120, 110)">
    <path class="p-light" d="M 40 20 L 40 100 M 40 20 L 110 20 Q 135 20 135 55 Q 135 75 110 75 L 40 75"/>
    <polyline class="heartbeat" points="60,65 68,65 71,54 75,80 79,63 83,73 86,65 100,65"/>
  </g>
  <text class="label" x="1170" y="330" fill="#0D1B2A" text-anchor="middle">Icon (Light)</text>

  <!-- VARIATION 6: Icon Only Dark (no wordmark) -->
  <rect class="box" x="20" y="400" width="220" height="280" fill="#0D1B2A" rx="8" stroke="#00BFA5" stroke-width="2"/>
  <g transform="translate(80, 490)">
    <path class="p-dark" d="M 40 20 L 40 100 M 40 20 L 110 20 Q 135 20 135 55 Q 135 75 110 75 L 40 75"/>
    <polyline class="heartbeat" points="60,65 68,65 71,54 75,80 79,63 83,73 86,65 100,65"/>
  </g>
  <text class="label" x="130" y="710" fill="#0D1B2A" text-anchor="middle">Icon (Dark)</text>

  <!-- Info Panel -->
  <rect class="box" x="280" y="400" width="900" height="280" fill="#1A2A36" rx="8" stroke="#8096A7" stroke-width="1"/>
  <text class="label" x="300" y="430" fill="#F0E9DC" font-size="18" font-weight="600">Logo Variations Summary</text>
  
  <text class="label" x="300" y="470" fill="#8096A7" font-size="12">✓ P Serif Letter (DM Serif Display inspired)</text>
  <text class="label" x="300" y="495" fill="#8096A7" font-size="12">✓ Heartbeat/EEG integrated in bowl (#00BFA5)</text>
  <text class="label" x="300" y="520" fill="#8096A7" font-size="12">✓ 4 Background variants + 2 Icon-only</text>
  <text class="label" x="300" y="545" fill="#8096A7" font-size="12">✓ Respects brand colors: Noite, Pulso, Areia, Névoa</text>
  <text class="label" x="300" y="570" fill="#8096A7" font-size="12">✓ Premium dark theme, scalable vectors</text>
  
  <text class="label" x="300" y="620" fill="#00BFA5" font-size="12" font-weight="600">Ready for:</text>
  <text class="label" x="300" y="645" fill="#8096A7" font-size="12">• SVG export (production)</text>
  <text class="label" x="300" y="670" fill="#8096A7" font-size="12">• PNG @2x, @3x (high-res mockups)</text>
</svg>
