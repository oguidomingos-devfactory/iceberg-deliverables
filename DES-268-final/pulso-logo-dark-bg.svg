<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="160" fill="#0D1B2A"/>

  <!-- P Icon: geometric sans-serif style P with heartbeat -->
  <g transform="translate(20, 20)">
    <!-- P letter - geometric sans, white on dark -->
    <rect x="10" y="10" width="12" height="100" fill="#F0E9DC" rx="2"/>
    <!-- P bowl -->
    <path d="M 22 10 L 55 10 Q 78 10 78 37 Q 78 60 55 60 L 22 60" fill="#F0E9DC"/>
    <path d="M 28 18 L 55 18 Q 68 18 68 37 Q 68 52 55 52 L 28 52" fill="#0D1B2A"/>

    <!-- Heartbeat inside P bowl -->
    <polyline points="30,37 38,37 41,26 46,50 50,31 54,42 57,37 72,37"
              fill="none" stroke="#00BFA5" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: PULSO in Bruno Ace SC -->
  <text x="115" y="95"
        font-family="'Bruno Ace SC', 'Courier New', monospace"
        font-size="48"
        font-weight="400"
        fill="#F0E9DC"
        letter-spacing="3">PULSO</text>

  <!-- Tagline -->
  <text x="115" y="118"
        font-family="'Bruno Ace SC', 'Courier New', monospace"
        font-size="10"
        fill="#8096A7"
        letter-spacing="2">MARKETING DE PRECISÃO</text>
</svg>
