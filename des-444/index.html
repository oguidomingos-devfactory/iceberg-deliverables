<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulso - Cartão de Visita</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:wght@400&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f5f5;
            display: flex;
            gap: 40px;
            padding: 40px;
            font-family: 'DM Sans', sans-serif;
        }

        .card {
            width: 320px;
            height: 207px;
            background: #0D1B2A;
            color: #F0E9DC;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .card.front {
            justify-content: flex-start;
            gap: 15px;
        }

        .logo-area {
            width: 60px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 10px;
            color: #00BFA5;
            font-weight: 400;
        }

        .name {
            font-family: 'DM Serif Display', serif;
            font-size: 14px;
            font-weight: 700;
            color: #F0E9DC;
            line-height: 1.2;
        }

        .specialty {
            font-size: 9px;
            color: #00BFA5;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .tagline {
            font-size: 8px;
            color: #F0E9DC;
            font-weight: 300;
            line-height: 1.4;
            max-width: 260px;
            margin-top: 5px;
        }

        .card.back {
            justify-content: flex-start;
            gap: 8px;
            padding-top: 20px;
        }

        .contact-title {
            font-family: 'DM Serif Display', serif;
            font-size: 9px;
            font-weight: 700;
            color: #00BFA5;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .contact-info {
            font-size: 8px;
            color: #F0E9DC;
            font-weight: 400;
            line-height: 1.6;
        }

        .contact-info div {
            margin-bottom: 3px;
        }

        /* Print styles */
        @media print {
            body {
                background: white;
                padding: 0;
                gap: 0;
            }

            .card {
                box-shadow: none;
                page-break-after: always;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <!-- FRENTE -->
    <div class="card front">
        <div class="logo-area">
            <div class="logo-text">[LOGO]</div>
        </div>
        <div>
            <div class="name">Marina Silva</div>
            <div class="specialty">CONSULTORA DE INOVAÇÃO</div>
            <div class="tagline">Transformando ideias em impacto</div>
        </div>
    </div>

    <!-- VERSO -->
    <div class="card back">
        <div class="contact-title">CONTATO</div>
        <div class="contact-info">
            <div>+55 (11) 98765-4321</div>
            <div>marina.silva@pulso.com</div>
            <div>www.pulso.com/marina</div>
            <div>São Paulo, SP</div>
        </div>
    </div>
</body>
</html>
