<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Search - Pulso Ads Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: arial, sans-serif;
            background: #fff;
            color: #202124;
            font-size: 14px;
        }

        /* ===== HEADER ===== */
        .header {
            background: #fff;
            padding: 10px 20px 0;
            border-bottom: 1px solid #dadce0;
        }
        .header-inner {
            display: flex;
            align-items: center;
            gap: 28px;
            max-width: 1200px;
        }
        .google-logo {
            flex-shrink: 0;
            height: 30px;
        }
        .google-logo svg { height: 30px; }

        /* Search bar in header */
        .search-bar {
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 692px;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 6px 8px 6px 20px;
            background: #fff;
            height: 44px;
        }
        .search-bar:hover { box-shadow: 0 1px 6px rgba(32,33,36,0.18); }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #202124;
            background: transparent;
            font-family: arial, sans-serif;
        }
        .search-bar .icons {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 8px;
        }
        .search-bar .icons .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: #70757a;
        }
        .search-bar .icons .icon-btn.search-submit {
            color: #4285f4;
            width: 38px;
            height: 38px;
            border-radius: 50%;
        }
        .search-bar .clear-btn {
            color: #70757a;
            cursor: pointer;
            font-size: 18px;
            padding: 0 12px;
            border-right: 1px solid #dadce0;
            margin-right: 4px;
            line-height: 24px;
        }

        /* Tabs nav */
        .tabs-nav {
            display: flex;
            gap: 4px;
            max-width: 1200px;
            padding-left: 154px;
            margin-top: 4px;
            overflow-x: auto;
        }
        .tab {
            padding: 8px 16px;
            color: #5f6368;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            text-decoration: none;
        }
        .tab:hover { color: #1a73e8; }
        .tab.active {
            color: #1a73e8;
            border-bottom-color: #1a73e8;
            font-weight: 500;
        }

        /* ===== MAIN CONTENT ===== */
        .main {
            max-width: 1200px;
            padding: 12px 0 40px;
            margin-left: 154px;
        }

        /* Location bar */
        .location-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 0;
            font-size: 14px;
            color: #202124;
            margin-bottom: 4px;
        }
        .location-bar .pin-icon { color: #70757a; font-size: 16px; }
        .location-bar .region-link {
            color: #1a73e8;
            text-decoration: none;
            margin-left: 4px;
        }
        .location-bar .region-link:hover { text-decoration: underline; }
        .location-bar .dots {
            color: #70757a;
            margin-left: 8px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }

        /* Section header */
        .section-header {
            font-size: 18px;
            font-weight: 400;
            color: #202124;
            padding: 8px 0 16px;
        }

        /* ===== AD RESULT ===== */
        .ad-result {
            margin-bottom: 28px;
            max-width: 600px;
        }
        .ad-top-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .ad-favicon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ad-favicon svg { width: 16px; height: 16px; }
        .favicon-letter {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .ad-site-info {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }
        .ad-site-name {
            font-size: 14px;
            color: #202124;
            font-weight: 400;
        }
        .ad-breadcrumb {
            font-size: 12px;
            color: #4d5156;
        }
        .ad-dots {
            margin-left: auto;
            color: #70757a;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 4px;
        }
        .ad-headline {
            font-size: 20px;
            color: #1a0dab;
            line-height: 1.3;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .ad-headline:hover { text-decoration: underline; }
        .ad-description {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.54;
            margin-bottom: 12px;
        }

        /* Sitelink extensions (callout style) */
        .ad-sitelink-ext {
            border-top: 1px solid #dadce0;
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            max-width: 600px;
        }
        .ad-sitelink-ext + .ad-sitelink-ext {
            border-top: 1px solid #dadce0;
        }
        .sitelink-info { flex: 1; }
        .sitelink-title {
            font-size: 16px;
            color: #1a0dab;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .sitelink-title:hover { text-decoration: underline; }
        .sitelink-desc {
            font-size: 13px;
            color: #4d5156;
            line-height: 1.4;
        }
        .sitelink-chevron {
            color: #dadce0;
            font-size: 20px;
            margin-left: 12px;
            margin-top: 4px;
        }

        /* ===== ORGANIC RESULTS ===== */
        .organic-result {
            margin-bottom: 24px;
            max-width: 600px;
            display: flex;
            gap: 16px;
        }
        .organic-content { flex: 1; }
        .organic-top-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
        }
        .organic-favicon {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .organic-favicon svg { width: 16px; height: 16px; }
        .organic-site-info {
            display: flex;
            flex-direction: column;
            line-height: 1.3;
        }
        .organic-site-name {
            font-size: 14px;
            color: #202124;
        }
        .organic-breadcrumb {
            font-size: 12px;
            color: #4d5156;
        }
        .organic-dots {
            margin-left: auto;
            color: #70757a;
            cursor: pointer;
            font-size: 18px;
        }
        .organic-title {
            font-size: 20px;
            color: #1a0dab;
            line-height: 1.3;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .organic-title:hover { text-decoration: underline; }
        .organic-desc {
            font-size: 14px;
            color: #4d5156;
            line-height: 1.54;
        }
        .organic-links {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
            font-size: 13px;
        }
        .organic-links a {
            color: #1a0dab;
            text-decoration: none;
        }
        .organic-links a:hover { text-decoration: underline; }
        .organic-links .sep { color: #70757a; }

        /* Divider between sponsored and organic */
        .results-divider {
            border: none;
            border-top: 1px solid #dadce0;
            margin: 20px 0;
            max-width: 600px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .tabs-nav { padding-left: 16px; }
            .main {
                margin-left: 0;
                padding: 12px 16px 40px;
            }
            .header-inner { gap: 12px; padding: 0; }
            .google-logo svg { height: 24px; }
            .search-bar { max-width: 100%; }
            .ad-headline, .organic-title { font-size: 18px; }
        }

        @media (max-width: 480px) {
            .tabs-nav { gap: 0; }
            .tab { padding: 8px 10px; font-size: 12px; }
        }
    </style>
</head>

    var sitelinkData = [
        { title: p('sitelink1Title'), desc: p('sitelink1Desc') },
        { title: p('sitelink2Title'), desc: p('sitelink2Desc') }
    ];
    sitelinkData.forEach(function(sl) {
        var ext = document.createElement('div');
        ext.className = 'ad-sitelink-ext';

        var info = document.createElement('div');
        info.className = 'sitelink-info';

        var title = document.createElement('div');
        title.className = 'sitelink-title';
        title.textContent = sl.title;

        var desc = document.createElement('div');
        desc.className = 'sitelink-desc';
        desc.textContent = sl.desc;

        info.appendChild(title);
        info.appendChild(desc);

        var chevron = document.createElement('span');
        chevron.className = 'sitelink-chevron';
        chevron.textContent = '\u203A';

        ext.appendChild(info);
        ext.appendChild(chevron);
        sitelinksContainer.appendChild(ext);
    });

    // Second ad
    document.getElementById('ad2SiteName').textContent = p('ad2Name');
    document.getElementById('ad2Breadcrumb').textContent = p('ad2Url');
    document.getElementById('ad2Headline').textContent = p('ad2Headline');
    document.getElementById('ad2Description').textContent = p('ad2Desc');

    function buildLinks(container, links) {
        links.forEach(function(lnk, i) {
            if (i > 0) {
                var sep = document.createElement('span');
                sep.className = 'sep';
                sep.textContent = ' \u00B7 ';
                container.appendChild(sep);
            }
            var a = document.createElement('a');
            a.href = '#';
            a.textContent = lnk;
            a.addEventListener('click', function(e) { e.preventDefault(); });
            container.appendChild(a);
        });
    }

    buildLinks(document.getElementById('ad2Links'), [p('ad2Link1'), p('ad2Link2'), p('ad2Link3')]);

    // Organic 1
    document.getElementById('org1SiteName').textContent = p('org1Name');
    document.getElementById('org1Breadcrumb').textContent = p('org1Url');
    document.getElementById('org1Title').textContent = p('org1Title');
    document.getElementById('org1Desc').textContent = p('org1Desc');
    buildLinks(document.getElementById('org1Links'), [p('org1Link1'), p('org1Link2')]);

    // Organic 2
    document.getElementById('org2SiteName').textContent = p('org2Name');
    document.getElementById('org2Breadcrumb').textContent = p('org2Url');
    document.getElementById('org2Title').textContent = p('org2Title');
    document.getElementById('org2Desc').textContent = p('org2Desc');
    buildLinks(document.getElementById('org2Links'), [p('org2Link1'), p('org2Link2')]);

    // Organic 3
    document.getElementById('org3SiteName').textContent = p('org3Name');
    document.getElementById('org3Breadcrumb').textContent = p('org3Url');
    document.getElementById('org3Title').textContent = p('org3Title');
    document.getElementById('org3Desc').textContent = p('org3Desc');

    console.log('Google Ads Preview loaded with params:', Object.fromEntries(params));
</script>
</body>
</html>
