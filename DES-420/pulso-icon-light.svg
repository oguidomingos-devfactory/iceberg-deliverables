<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 250 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="250" height="300" fill="#FAFAF8"/>

  <!-- P Letter (Stem + Bowl) -->
  <g id="P-letter">
    <rect x="50" y="30" width="50" height="240" fill="#0D1B2A" rx="8"/>
    <path d="M 100 50 Q 150 50 150 130 Q 150 190 100 190 L 100 50 Z" fill="#0D1B2A"/>
    <path d="M 125 80 Q 160 80 160 130 Q 160 170 125 170 L 125 80 Z" fill="#FAFAF8"/>
  </g>

  <!-- Heartbeat Polyline -->
  <g id="heartbeat" stroke="#00BFA5" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="70,140 90,140 100,110 110,140 130,140 140,125 150,150 170,150"/>
  </g>
</svg>